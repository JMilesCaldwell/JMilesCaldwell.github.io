<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J. Miles Caldwell</title>
  <link rel="icon" href="/resources/jmc_favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var t = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #14171c;
      --panel-elev: #1a1e24;
      --ink: #e6e8ec;
      --ink-strong: #ffffff;
      --muted: #8b919a;
      --border: rgba(255,255,255,0.08);
      --accent: #7aa2f7;
      --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.25);
    }
    :root[data-theme="light"] {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-elev: #f0f2f5;
      --ink: #1a1d23;
      --ink-strong: #000000;
      --muted: #6b7280;
      --border: rgba(0,0,0,0.08);
      --accent: #2563eb;
      --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; }
    html, body { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.55;
      transition: background-color 0.2s, color 0.2s;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.25rem 1.5rem;
      display: flex;
      justify-content: flex-end;
    }
    .theme-toggle {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink);
      transition: background-color 0.15s, border-color 0.15s, transform 0.15s;
    }
    .theme-toggle:hover { background: var(--panel-elev); border-color: var(--accent); }
    .theme-toggle:active { transform: scale(0.96); }
    .theme-toggle svg { width: 18px; height: 18px; }
    .theme-toggle .sun { display: none; }
    .theme-toggle .moon { display: block; }
    :root[data-theme="light"] .theme-toggle .sun { display: block; }
    :root[data-theme="light"] .theme-toggle .moon { display: none; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .container {
      width: 100%;
      max-width: 560px;
    }
    h1 {
      font-size: 2.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.4rem;
      color: var(--ink-strong);
    }
    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin: 0 0 2rem;
    }
    ul.links {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    ul.links li a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1.1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--ink);
      text-decoration: none;
      font-size: 0.95rem;
      transition: background-color 0.15s, border-color 0.15s, transform 0.15s;
      box-shadow: var(--shadow);
    }
    ul.links li a:hover {
      background: var(--panel-elev);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    ul.links li a .label {
      font-weight: 600;
    }
    ul.links li a .sub {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 400;
    }
    ul.links li a .arrow {
      color: var(--muted);
      transition: color 0.15s, transform 0.15s;
    }
    ul.links li a:hover .arrow {
      color: var(--accent);
      transform: translateX(2px);
    }
  </style>
</head>
<body>
  <header>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    </button>
  </header>

  <main>
    <div class="container">
      <h1>J. Miles Caldwell</h1>
      <p class="tagline">A small set of things I&rsquo;ve made.</p>
      <ul class="links">
        <li>
          <a href="dashboard.html">
            <span><span class="label">Dashboard</span> <span class="sub">&mdash; news &amp; weather</span></span>
            <span class="arrow" aria-hidden="true">&rarr;</span>
          </a>
        </li>
        <li>
          <a href="caldwell-repo.html">
            <span><span class="label">Caldwell&rsquo;s Repository</span> <span class="sub">&mdash; tabletop &amp; D&amp;D material</span></span>
            <span class="arrow" aria-hidden="true">&rarr;</span>
          </a>
        </li>
        <li>
          <a href="imogen/index.html">
            <span><span class="label">Imogen</span> <span class="sub">&mdash; imagination suite</span></span>
            <span class="arrow" aria-hidden="true">&rarr;</span>
          </a>
        </li>
        <li>
          <a href="imogen/apocrypha/index.html">
            <span><span class="label">Apocrypha</span></span>
            <span class="arrow" aria-hidden="true">&rarr;</span>
          </a>
        </li>
      </ul>
    </div>
  </main>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
