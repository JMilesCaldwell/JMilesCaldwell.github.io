  on next session) — chain verified end-to-end. Joe ran a fresh

  Diagnosis turned out worse than first read: entries 176-179
  contained literal HTML-comment tokens (`&lt;!--` and `--&gt;`)
  inside backticks. HTML parsers don't see backticks — those
  literals were both (a) tripping awk's exit and (b) breaking the
  HTML at file level (head comment closing at the first in-prose
  `--&gt;`, leaking subsequent entries into live document context).
  Fix in this commit: escape `&lt;!--` and `--&gt;` in offending
  prose (HTML entities — read correctly to a human, don't terminate
  a comment to a parser); tighten awk regex to standalone-line-only
  match; restore the missing closing tag at the end of the head
  comment.

  [2026-05-01] [lesson] Memory-log entries cannot contain the
  literal HTML-comment tokens — even in backticks, prose, or
  quoted regex. HTML parsers see `&lt;!--` and `--&gt;` as comment
  delimiters wherever they appear inside a comment block; the
  spec disallows them. Convention: escape both as HTML entities
  in source text. The awk extractor is now hardened to require a
  standalone-line match, so a slip won't truncate the log on
  output — but the file itself would still be malformed HTML.
  This is a hard rule, not a polite suggestion.
