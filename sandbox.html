  on next session) — chain verified end-to-end. Joe ran a fresh

  Diagnosis turned out worse than first read: entries 176-179
  contained literal HTML-comment tokens (`&lt;!--` and `--&gt;`)

  literals were both (a) tripping awk's exit and (b) breaking the

  prose (HTML entities — read correctly to a human, don't terminate
  a comment to a parser); tighten awk regex to standalone-line-only
  match; restore the missing closing tag at the end of the head
  comment.

  [2026-05-01] [lesson] Memory-log entries cannot contain the
  literal HTML-comment tokens — even in backticks, prose, or
  quoted regex. HTML parsers see `&lt;!--` and `--&gt;` as comment
  delimiters wherever they appear inside a comment block; the
  spec disallows them. Convention: escape both as HTML entities
  in source text. The awk extractor is now hardened to require a
  standalone-line match, so a slip won't truncate the log on
  output — but the file itself would still be malformed HTML.
  This is a hard rule, not a polite suggestion.

  [2026-06-17] [social] CORS proxies ALSO dead, confirmed by Joe's console:

    body {
      margin: 0;
      padding: 2rem;
      background: #0b0d10;
      color: #e6e8ec;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;

      line-height: 1.5;
    }
    h1 { font-size: 1.2rem; margin: 0 0 0.5rem; }
    h2 { font-size: 0.95rem; margin: 1.5rem 0 0.5rem; color: #8b919a; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
    .status { color: #8b919a; margin-bottom: 1.5rem; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    th, td { padding: 0.4rem 0.6rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); vertical-align: top; }
    th { color: #8b919a; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    td.ok { color: #34d399; }
    td.fail { color: #f87171; }
    td.warn { color: #fbbf24; }
    td.dim { color: #8b919a; }
    td.title { max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    pre { background: #14171c; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 1rem; overflow-x: auto; font-size: 12px; }

<body>
  <h1>Dashboard feed health</h1>
  <p class="status" id="status">Probing feeds&hellip;</p>

  <h2>Feed probes</h2>
  <table id="feeds-table">
    <thead><tr>
      <th>Group</th><th>Source</th><th>Status</th><th>Items</th><th>Img</th><th>First title</th><th>ms</th><th>Error</th>
    </tr></thead>
    <tbody></tbody>
  </table>

  <h2>Stream probes (web radio)</h2>
  <p class="status" id="streams-status">Idle.</p>
  <table id="streams-table">
    <thead><tr>
      <th>Group</th><th>Station</th><th>Status</th><th>ms</th><th>Error</th>
    </tr></thead>
    <tbody></tbody>
  </table>

  <h2>discover.json contents</h2>
  <pre id="discover-out">loading&hellip;</pre>

  <h2>Environment</h2>
  <pre id="env-out"></pre>

  <h2>Hand back to Claude</h2>
  <p class="status">Click to copy the full result blob, paste it into chat.</p>
  <button id="copy-btn">Copy results JSON</button>
  <pre id="json-out" style="display:none"></pre>

  <script>
  (async () => {
    const RSS_PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';
    const FEEDS = [
      ['News:Local',  '112 Zwolle',   'https://www.112zwolle.nl/feed/'],
      ['News:Local',  'RTV Focus',    'https://www.rtvfocuszwolle.nl/feed/'],
      ['News:Local',  'WeblogZwolle', 'https://weblogzwolle.nl/feed/'],
      ['News:Local',  'RTV Oost',     'https://www.rtvoost.nl/rss'],
      ['News:Nat',    'NOS',          'https://feeds.nos.nl/nosnieuwsalgemeen'],
      ['News:Nat',    'FtM',          'https://www.ftm.nl/feed/'],
      ['News:Nat',    'OneWorld',     'https://www.oneworld.nl/feed/'],
      ['News:World',  'BBC',          'https://feeds.bbci.co.uk/news/world/rss.xml'],
      ['News:World',  'NPR',          'https://feeds.npr.org/1004/rss.xml'],
      ['News:World',  'Guardian',     'https://www.theguardian.com/world/rss'],
      ['News:World',  'Al Jazeera',   'https://www.aljazeera.com/xml/rss/all.xml'],
      ['Discover',    'Oatmeal',      'https://theoatmeal.com/feed/rss'],
      ['Discover',    'PDR',          'https://publicdomainreview.org/rss.xml'],
      ['Discover',    'Futility',     'https://www.futilitycloset.com/feed/'],
      ['Discover',    'Curmudgeon',   'https://joshreads.com/feed'],
      ['Discover',    '50 Watts',     'https://50watts.com/rss'],
      ['Discover',    'Goblins',      'https://www.goblinscomic.com/feed/'],
      ['Tech',        'HN',           'https://hnrss.org/frontpage'],
      ['Tech',        'Willison',     'https://simonwillison.net/atom/everything/'],
      ['Tech',        'OpenAI',       'https://openai.com/blog/rss.xml'],
      ['Tech',        'DeepMind',     'https://deepmind.google/blog/rss.xml'],
      ['Tech',        'Ars Technica', 'https://feeds.arstechnica.com/arstechnica/index'],
      ['Tech',        '404 Media',    'https://www.404media.co/rss/']
    ];

    const tbody = document.querySelector('#feeds-table tbody');
    const statusEl = document.getElementById('status');

    function addRow(r) {
      const tr = document.createElement('tr');
      const cls = r.status === 'OK' ? 'ok' : (r.status === 'EXC' ? 'fail' : 'warn');
      tr.innerHTML = `
        <td class="dim">${r.group}</td>
        <td>${r.name}</td>
        <td class="${cls}">${r.status}</td>
        <td>${r.items}</td>
        <td class="dim">${r.first_img ? 'y' : ''}</td>
        <td class="title">${(r.first_title || '').replace(/</g, '&lt;')}</td>
        <td class="dim">${r.ms}</td>
        <td class="fail">${(r.error || '').replace(/</g, '&lt;')}</td>
      `;
      tbody.appendChild(tr);
    }

    const results = [];
    let done = 0;
    await Promise.all(FEEDS.map(async ([group, name, url]) => {
      const proxied = RSS_PROXY + encodeURIComponent(url);
      let r;
      try {
        const t0 = performance.now();
        const resp = await fetch(proxied);
        const j = await resp.json();
        const ms = Math.round(performance.now() - t0);
        const ok = j.status === 'ok';
        const first = j.items && j.items[0];
        r = {
          group, name, url,
          status: ok ? 'OK' : (j.status || 'fail'),
          items: (j.items && j.items.length) || 0,
          first_title: (first && first.title || '').slice(0, 80),
          first_date: (first && first.pubDate || '').slice(0, 16),
          first_img: !!(first && (first.thumbnail || (first.enclosure && first.enclosure.link) || /<img/i.test(first.description || ''))),
          ms,
          error: ok ? '' : (j.message || '').slice(0, 120)
        };
      } catch (e) {
        r = { group, name, url, status: 'EXC', items: 0, first_title: '', first_date: '', first_img: false, ms: 0, error: String(e).slice(0, 120) };
      }
      results.push(r);
      addRow(r);
      done++;
      statusEl.textContent = `Probed ${done} / ${FEEDS.length} feeds`;
    }));

    statusEl.textContent = `Done. ${results.filter(r => r.status === 'OK').length} / ${results.length} feeds healthy.`;

    // -----------------------------------------------------------------------
    // Stream probes (web radio): try to load each URL in a hidden Audio
    // element, race against a timeout, record whichever event fires first.
    // -----------------------------------------------------------------------
    const STREAMS = [
      ['Dutch',   'NPO Radio 1',         'https://icecast.omroep.nl/radio1-bb-mp3'],
      ['Dutch',   'NPO Radio 2',         'https://icecast.omroep.nl/radio2-bb-mp3'],
      ['Dutch',   'NPO 3FM',             'https://icecast.omroep.nl/3fm-bb-mp3'],
      ['Dutch',   'BNR Nieuwsradio',     'https://stream.bnr.nl/bnr_mp3_128_03'],
      ['US',      'KEXP',                'https://kexp-mp3-128.streamguys1.com/kexp128.mp3'],
      ['US',      'WNYC 93.9 FM (HLS)',  'https://hls-live.wnyc.org/wnycfmapp-hls.aac/playlist.m3u8'],
      ['US',      'Radio Paradise',      'https://stream.radioparadise.com/mp3-192'],
      ['US',      'SomaFM Boot Liquor',  'https://ice1.somafm.com/bootliquor-128-mp3'],
      ['Weird',   'WFMU Freeform',       'https://stream0.wfmu.org/freeform-128k'],
      ['Weird',   'SomaFM Mission Ctrl', 'https://ice1.somafm.com/missioncontrol-128-mp3'],
      ['Weird',   'SomaFM Drone Zone',   'https://ice1.somafm.com/dronezone-128-mp3'],
      ['Weird',   'SomaFM Cliqhop IDM',  'https://ice1.somafm.com/cliqhop-128-mp3'],
      ['Weird',   'SomaFM Lush',         'https://ice1.somafm.com/lush-128-mp3'],
      ['Weird',   'Lofi Hip Hop',        'https://stream.zeno.fm/f3wvbbqmdg8uv']
    ];

    const stbody = document.querySelector('#streams-table tbody');
    const sstatus = document.getElementById('streams-status');

    function probeStream(name, url, timeoutMs = 8000) {
      return new Promise(resolve => {
        const t0 = performance.now();
        const a = new Audio();
        a.preload = 'auto';
        let done = false;
        const finish = (status, error = '') => {
          if (done) return;
          done = true;
          try { a.pause(); } catch {}
          a.removeAttribute('src');
          try { a.load(); } catch {}
          resolve({ name, url, status, ms: Math.round(performance.now() - t0), error });
        };
        const codes = { 1: 'aborted', 2: 'network', 3: 'decode', 4: 'unsupported / CORS / mixed-content' };
        a.addEventListener('canplay',    () => finish('OK'));
        a.addEventListener('loadeddata', () => finish('OK'));
        a.addEventListener('playing',    () => finish('OK'));
        a.addEventListener('error', () => {
          const e = a.error;
          finish('error', e ? ((codes[e.code] || 'media') + ' (code ' + e.code + ')') : 'media error');
        });
        setTimeout(() => finish('timeout'), timeoutMs);
        a.src = url;
        a.load();
      });
    }

    function addStreamRow(r) {
      const tr = document.createElement('tr');
      const cls = r.status === 'OK' ? 'ok' : (r.status === 'timeout' ? 'warn' : 'fail');
      tr.innerHTML = `
        <td class="dim">${r.group}</td>
        <td>${r.name}</td>
        <td class="${cls}">${r.status}</td>
        <td class="dim">${r.ms}</td>
        <td class="fail">${(r.error || '').replace(/</g, '&lt;')}</td>
      `;
      stbody.appendChild(tr);
    }

    sstatus.textContent = `Probing ${STREAMS.length} streams (up to 8s each, run in parallel)…`;
    const streamResults = [];
    await Promise.all(STREAMS.map(async ([group, name, url]) => {
      const r = await probeStream(name, url);
      const row = { group, ...r };
      streamResults.push(row);
      addStreamRow(row);
    }));
    sstatus.textContent =
      `Done. ${streamResults.filter(r => r.status === 'OK').length} / ${streamResults.length} streams playable. ` +
      `Note: a "timeout" can mean the stream is reachable but slow to send the first audio packet — not necessarily broken. ` +
      `"unsupported / CORS / mixed-content" usually means the URL is dead or HTTP-only. ` +
      `HLS (.m3u8) streams will show "error" here in Chrome/Firefox because this probe uses bare <audio>; ` +
      `the dashboard lazy-loads hls.js so HLS still plays there.`;

    // discover.json
    let discoverData = null;
    try {
      const r = await fetch('/resources/discover.json', { cache: 'no-cache' });
      discoverData = await r.json();
      const summary = {};
      Object.entries(discoverData).forEach(([k, v]) => {
        if (Array.isArray(v)) summary[k] = v.length;
      });
      document.getElementById('discover-out').textContent = JSON.stringify(summary, null, 2);
    } catch (e) {
      document.getElementById('discover-out').textContent = 'fetch failed: ' + e;
    }

    // Environment
    document.getElementById('env-out').textContent =
      `now: ${new Date().toISOString()}\n` +
      `tz: ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n` +
      `ua: ${navigator.userAgent}\n` +
      `origin: ${location.origin}`;

    const blob = {
      timestamp: new Date().toISOString(),
      feeds: results.sort((a, b) => a.group.localeCompare(b.group) || a.name.localeCompare(b.name)),
      streams: streamResults.sort((a, b) => a.group.localeCompare(b.group) || a.name.localeCompare(b.name)),
      discover_summary: discoverData ? Object.fromEntries(Object.entries(discoverData).filter(([k,v]) => Array.isArray(v)).map(([k,v]) => [k, v.length])) : null,
      env: { tz: Intl.DateTimeFormat().resolvedOptions().timeZone, ua: navigator.userAgent }
    };
    const jsonOut = document.getElementById('json-out');
    jsonOut.textContent = JSON.stringify(blob, null, 2);

    document.getElementById('copy-btn').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(jsonOut.textContent);
        const btn = document.getElementById('copy-btn');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      } catch {
        jsonOut.style.display = 'block';
      }
    });
  })();
  </script>
</body>
