<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CHONK INVADERS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#080810;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    min-height:100vh;
    font-family:'Press Start 2P', monospace;
    overflow-x:hidden;
    overflow-y:auto;
    color:#fff;
    padding:4px 0;
  }
  #wrapper {
    position:relative;
    width:100%;
    max-width:620px;
    display:flex;
    flex-direction:column;
  }
  #center-col {
    display:flex;
    flex-direction:column;
    width:100%;
    min-width:0;
  }
  canvas {
    display:block;
    width:100% !important;
    height:auto !important;
    border:2px solid #1a1a3a;
    box-shadow:0 0 30px #0044ffaa, 0 0 60px #0022ff44;
    image-rendering:pixelated;
  }

  /* ── fullscreen row layout ── */
  #wrapper:-webkit-full-screen,
  #wrapper:fullscreen {
    max-width:100vw; width:100vw; height:100vh;
    flex-direction:row;
    align-items:stretch;
    background:#080810;
  }
  #wrapper:-webkit-full-screen #center-col,
  #wrapper:fullscreen #center-col {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  #wrapper:-webkit-full-screen #center-col canvas,
  #wrapper:fullscreen #center-col canvas {
    width:100% !important;
    height:auto !important;
    max-height:100vh;
  }
  /* side panels: hidden normally, shown in fullscreen */
  .fs-panel {
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:stretch;
    gap:8px;
    padding:8px;
    width:90px;
  }
  #wrapper:-webkit-full-screen .fs-panel,
  #wrapper:fullscreen .fs-panel { display:flex; }

  /* hide bottom controls in fullscreen */
  #wrapper:-webkit-full-screen #mobile-controls,
  #wrapper:fullscreen #mobile-controls { display:none !important; }

  /* hide hud/footer text in fullscreen (canvas HUD handles it) */
  #wrapper:-webkit-full-screen #hud,
  #wrapper:-webkit-full-screen #powerup-bar,
  #wrapper:-webkit-full-screen #footer,
  #wrapper:fullscreen #hud,
  #wrapper:fullscreen #powerup-bar,
  #wrapper:fullscreen #footer { display:none; }

  #mobile-controls {
    display:none; /* shown by JS on touch devices */
    justify-content:space-between;
    align-items:center;
    padding:8px 4px 2px;
    gap:8px;
  }
  .ctrl-btn {
    font-family:'Press Start 2P',monospace;
    font-size:16px;
    background:#1a1a3a;
    color:#aabbff;
    border:2px solid #334499;
    border-radius:6px;
    padding:12px 20px;
    cursor:pointer;
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
    flex:1;
    text-align:center;
  }
  .ctrl-btn:active { background:#2a2a5a; }
  .fs-btn {
    flex:1;
    font-size:22px;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #powerup-bar {
    font-size:9px; color:#ff88ff; text-align:center; height:16px;
    text-shadow:0 0 8px #ff88ffaa; letter-spacing:1px;
  }
  #hud {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 4px;
    font-size:11px;
    color:#ffcc00;
    text-shadow:0 0 10px #ffcc00aa;
    letter-spacing:1px;
  }
  #footer {
    font-size:9px;
    color:#334;
    text-align:center;
    padding:6px 0;
    letter-spacing:1px;
  }
  #nameInput {
    font-family:'Press Start 2P',monospace;
    font-size:12px;
    background:#1a1a3a;
    color:#ffcc00;
    border:2px solid #334499;
    padding:8px;
    width:200px;
    text-align:center;
  }
  #leaderboard {
    display:none;
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.95);
    z-index:1000;
    padding:20px;
    overflow-y:auto;
    font-family:'Press Start 2P',monospace;
    color:#ffcc00;
  }
  #leaderboard.show {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
  }
  #leaderboard h1 {
    font-size:20px;
    color:#ff88ff;
    margin:20px 0;
    text-shadow:0 0 10px #ff88ffaa;
  }
  #leaderboard-list {
    width:100%;
    max-width:400px;
    font-size:10px;
  }
  .leaderboard-entry {
    display:flex;
    justify-content:space-between;
    padding:8px 4px;
    border-bottom:1px solid #334499;
    color:#aabbff;
  }
  .leaderboard-entry.rank1 { color:#ffcc00; background:rgba(255,200,0,0.1); }
  .leaderboard-entry.rank2 { color:#cccccc; }
  .leaderboard-entry.rank3 { color:#cc9966; }
  #leaderboard-close {
    margin-top:20px;
    font-size:9px;
    color:#888;
  }
</style>
</head>
<body>

<div id="wrapper">
  <!-- fullscreen left panel -->
  <div id="fs-left" class="fs-panel">
    <button class="ctrl-btn fs-btn" id="btn-left-fs">◀</button>
  </div>

  <!-- main game column -->
  <div id="center-col">
    <div id="hud">
      <span>SCORE<br><span id="score" style="color:#fff;font-size:13px">0</span></span>
      <span style="color:#ff88ff;font-size:13px;text-shadow:0 0 12px #ff88ffaa">CHONK INVADERS</span>
      <span>LIVES<br><span id="lives" style="color:#fff;font-size:13px">❤❤❤</span></span>
    </div>
    <div id="powerup-bar">&nbsp;</div>
    <canvas id="game" width="620" height="580"></canvas>
    <div id="footer" style="display:flex;justify-content:space-between;align-items:center;padding:4px 2px">
      <span style="font-size:9px;color:#334;letter-spacing:1px">← → MOVE &nbsp;|&nbsp; SPACE SHOOT</span>
      <button id="fsBtn" onclick="toggleFS()" style="font-family:'Press Start 2P',monospace;font-size:7px;background:#1a1a3a;color:#aabbff;border:1px solid #334499;padding:3px 7px;cursor:pointer;letter-spacing:1px">⛶ FULL</button>
    </div>
    <div id="mobile-controls">
      <button class="ctrl-btn" id="btn-left">◀</button>
      <button class="ctrl-btn" id="fire-btn">FEED</button>
      <button class="ctrl-btn" id="btn-right">▶</button>
    </div>
  </div>

  <!-- fullscreen right panel -->
  <div id="fs-right" class="fs-panel">
    <button class="ctrl-btn fs-btn" id="fire-btn-fs">FEED</button>
    <button class="ctrl-btn fs-btn" id="btn-right-fs">▶</button>
  </div>

  <div id="leaderboard">
    <h1>HIGH SCORES</h1>
    <div id="leaderboard-list"></div>
    <div id="leaderboard-close">PRESS ENTER / TAP TO CLOSE</div>
  </div>
</div>

<script>
// ── device detection ─────────────────────────────────────────────────────────
const isTouchDevice = () => navigator.maxTouchPoints > 0;

function updateControlVisibility() {
  const mobileControls = document.getElementById('mobile-controls');
  mobileControls.style.display = isTouchDevice() ? 'flex' : 'none';
}
updateControlVisibility();
window.addEventListener('resize', updateControlVisibility);

function toggleFS() {
  const el = document.getElementById('wrapper');
  if (!document.fullscreenElement) {
    el.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', ()=>{
  const btn = document.getElementById('fsBtn');
  btn.textContent = document.fullscreenElement ? '✕ EXIT' : '⛶ FULL';
});


const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Dreamlo leaderboard config
const DREAMLO_PRIVATE = 'RQcgMra0b0eJcTc6B1EtcwBs4TGb5suEyNZvw1eGYIhA';
const DREAMLO_PUBLIC = '69d8f23e8f40bc2f60342a03';
let leaderboard = [];

// ── image loading ─────────────────────────────────────────────────────────────
const IMGS = {};
const SRC = {
  cat1:'catgame/Cat1.png', cat2:'catgame/Cat2.png',
  cat3:'catgame/Cat3.png', cat4:'catgame/Cat4.png',
  chonker1:'catgame/Chonker1.png', chonker2:'catgame/Chonker2.png',
  kibble:'catgame/kibble.png',
};
let loadedCount = 0;
const totalImgs = Object.keys(SRC).length;
for (const [k,src] of Object.entries(SRC)) {
  IMGS[k] = new Image();
  IMGS[k].onload  = () => { if (++loadedCount === totalImgs) startGame(); };
  IMGS[k].onerror = () => { if (++loadedCount === totalImgs) startGame(); };
  IMGS[k].src = src;
}

// ── bowl canvas (procedural) ──────────────────────────────────────────────────
function makeBowl() {
  const bc = document.createElement('canvas');
  bc.width = 64; bc.height = 44;
  const bx = bc.getContext('2d');

  // Shadow
  bx.fillStyle='rgba(0,0,0,0.3)';
  bx.beginPath();
  bx.ellipse(32,44,26,5,0,0,Math.PI*2);
  bx.fill();

  // Bowl body
  const grad = bx.createRadialGradient(28,18,2,32,22,30);
  grad.addColorStop(0,'#f5e8c8');
  grad.addColorStop(0.6,'#d4b483');
  grad.addColorStop(1,'#a07840');
  bx.fillStyle = grad;
  bx.beginPath();
  bx.moveTo(4,20);
  bx.bezierCurveTo(4,40, 60,40, 60,20);
  bx.ellipse(32,20,28,9,0,Math.PI,0,true);
  bx.closePath();
  bx.fill();

  // Inner bowl dark
  bx.fillStyle='rgba(80,40,10,0.15)';
  bx.beginPath();
  bx.ellipse(32,20,22,7,0,0,Math.PI*2);
  bx.fill();

  // Rim highlight
  bx.strokeStyle='#f0d8a0';
  bx.lineWidth=2.5;
  bx.beginPath();
  bx.ellipse(32,20,28,9,0,Math.PI,0,false);
  bx.stroke();

  // Kibble pieces in bowl
  const pieces = [{x:16,y:24},{x:24,y:28},{x:32,y:26},{x:40,y:28},{x:48,y:24}];
  for (const p of pieces) {
    bx.fillStyle='#c87040';
    bx.beginPath();
    bx.ellipse(p.x,p.y,5,4,Math.random()*1,0,Math.PI*2);
    bx.fill();
    bx.fillStyle='#e89060';
    bx.beginPath();
    bx.arc(p.x-1,p.y-1,2,0,Math.PI*2);
    bx.fill();
  }

  // Shine
  bx.fillStyle='rgba(255,255,255,0.28)';
  bx.beginPath();
  bx.ellipse(20,16,7,3.5,-0.4,0,Math.PI*2);
  bx.fill();

  return bc;
}

// ── helpers ───────────────────────────────────────────────────────────────────
function hit(a,b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function drawSprite(key,x,y,w,h,alpha=1) {
  const img = IMGS[key];
  ctx.globalAlpha = alpha;
  if (img && img.complete && img.naturalWidth>0) {
    ctx.drawImage(img,x,y,w,h);
  } else {
    ctx.fillStyle = key.startsWith('chonker') ? '#ff6655' : '#88ccff';
    ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#fff';
    ctx.font='10px sans-serif';
    ctx.fillText(key,x+2,y+14);
  }
  ctx.globalAlpha=1;
}

// ── game state ────────────────────────────────────────────────────────────────
const BOWL_W=64, BOWL_H=44;
const CAT_W=50, CAT_H=50;
const COLS=8, ROWS=4;
const CAT_KEYS=['cat1','cat2','cat3','cat4'];

let score, lives, level;
let player, cats, shots, drops, flyOffs, floaties, hearts, chonker, chonkerPhase;
let stepTimer, stepInterval, stepDir;
let dropTimer;
let shotCooldown;
let gameOver, phase;
let frame;
let bowlCanvas;
let stars;
let powerup; // { type:'twin'|'pierce', timer:600 }

const keys = {};
let mouse = { x: W/2, y: H/2 };
function canvasCoords(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (W / r.width),
    y: (clientY - r.top)  * (H / r.height),
  };
}
canvas.addEventListener('mousemove', e => {
  const c = canvasCoords(e.clientX, e.clientY);
  mouse.x = c.x; mouse.y = c.y;
});
canvas.addEventListener('click', () => { keys[' '] = true; setTimeout(()=>keys[' ']=false, 50); });
window.addEventListener('keydown', e => {
  keys[e.key]=true;
  if (e.key===' ') e.preventDefault();
  if (e.key==='Enter') {
    if (phase==='title') reset();
    if (gameOver && phase==='over') {
      const name = prompt('Enter your name:', 'PLAYER');
      if (name !== null) {
        submitScore(name).then(() => {
          phase = 'title';
          gameOver = false;
          player = null;
        });
      } else {
        phase = 'title';
        gameOver = false;
        player = null;
      }
    }
    if (phase==='leaderboard') hideLeaderboard();
  }
  if ((e.key==='l'||e.key==='L') && (gameOver || phase==='title')) {
    showLeaderboard();
  }
});
window.addEventListener('keyup', e => keys[e.key]=false);

// Mobile controls — safely after canvas & mouse are declared
function holdKey(el, key) {
  el.addEventListener('touchstart',  e=>{ e.preventDefault(); keys[key]=true; },  {passive:false});
  el.addEventListener('touchend',    e=>{ e.preventDefault(); keys[key]=false; }, {passive:false});
  el.addEventListener('touchcancel', e=>{ keys[key]=false; });
  el.addEventListener('mousedown',   e=>{ keys[key]=true; });
  el.addEventListener('mouseup',     e=>{ keys[key]=false; });
  el.addEventListener('mouseleave',  e=>{ keys[key]=false; });
}
holdKey(document.getElementById('btn-left'),     'ArrowLeft');
holdKey(document.getElementById('btn-right'),    'ArrowRight');
holdKey(document.getElementById('fire-btn'),     ' ');
holdKey(document.getElementById('btn-left-fs'),  'ArrowLeft');
holdKey(document.getElementById('btn-right-fs'), 'ArrowRight');
holdKey(document.getElementById('fire-btn-fs'),  ' ');
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const c = canvasCoords(e.touches[0].clientX, e.touches[0].clientY);
  mouse.x = c.x; mouse.y = c.y;
}, {passive:false});
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const c = canvasCoords(e.touches[0].clientX, e.touches[0].clientY);
  mouse.x = c.x; mouse.y = c.y;
  if (phase==='title') reset();
  if (gameOver && phase==='over') {
    const name = prompt('Enter your name:', 'PLAYER');
    if (name !== null) {
      submitScore(name).then(() => {
        phase = 'title';
        gameOver = false;
        player = null;
      });
    } else {
      phase = 'title';
      gameOver = false;
      player = null;
    }
  }
  if (phase==='leaderboard') hideLeaderboard();
}, {passive:false});

function makeStars() {
  stars=[];
  for(let i=0;i<80;i++){
    stars.push({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.2+0.3, t:Math.random()*Math.PI*2 });
  }
}

// ── Dreamlo leaderboard ───────────────────────────────────────────────────────
const DREAMLO_BASE = `https://corsproxy.io/?url=http://dreamlo.com/lb`;

async function fetchLeaderboard() {
  try {
    const res = await fetch(`${DREAMLO_BASE}/${DREAMLO_PUBLIC}/json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const raw = data.dreamlo?.leaderboard?.entry;
    if (!raw) { leaderboard = []; return; }
    leaderboard = (Array.isArray(raw) ? raw : [raw]).slice(0, 10);
  } catch (e) {
    leaderboard = null;
    console.error('Leaderboard fetch failed:', e);
  }
}

async function submitScore(name) {
  const cleanName = (name || 'ANON').substring(0, 20).toUpperCase();
  try {
    await fetch(`${DREAMLO_BASE}/${DREAMLO_PRIVATE}/add/${encodeURIComponent(cleanName)}/${Math.floor(score)}`);
    await fetchLeaderboard();
  } catch (e) {
    console.error('Score submit failed', e);
  }
}

function renderLeaderboard() {
  const list = document.getElementById('leaderboard-list');
  list.innerHTML = '';
  if (leaderboard === null) {
    list.innerHTML = '<div style="padding:20px;color:#ff4444;font-size:7px;">FETCH ERROR — CHECK CONSOLE</div>';
  } else if (leaderboard.length === 0) {
    list.innerHTML = '<div style="padding:20px;color:#888;font-size:8px;">NO SCORES YET</div>';
  } else {
    leaderboard.forEach((entry, i) => {
      const div = document.createElement('div');
      div.className = `leaderboard-entry ${i === 0 ? 'rank1' : i === 1 ? 'rank2' : i === 2 ? 'rank3' : ''}`;
      div.innerHTML = `<span>${i+1}. ${entry.name}</span><span>${entry.score}</span>`;
      list.appendChild(div);
    });
  }
}

function showLeaderboard() {
  phase = 'leaderboard';
  document.getElementById('leaderboard-list').innerHTML = '<div style="padding:20px;color:#888;font-size:8px;">LOADING...</div>';
  document.getElementById('leaderboard').classList.add('show');
  fetchLeaderboard().then(renderLeaderboard);
}

function hideLeaderboard() {
  document.getElementById('leaderboard').classList.remove('show');
  phase = 'title';
  gameOver = false;
}

function reset() {
  score=0; lives=3; level=1; frame=0;
  gameOver=false; phase='play';
  updateHUD();
  bowlCanvas = makeBowl();
  makeStars();
  spawnWave();
}

function spawnWave() {
  player  = { x:W/2-BOWL_W/2, y:H-60, w:BOWL_W, h:BOWL_H };
  shots   = [];
  drops   = [];
  flyOffs = [];
  floaties = [];
  hearts  = [];
  powerup = null;
  chonker = null;
  chonkerPhase = false;
  stepDir = 1;
  stepTimer = 0;
  stepInterval = 55;
  dropTimer = 0;
  shotCooldown = 0;
  phase = 'play';

  cats=[];
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      cats.push({
        x:50+c*66, y:60+r*64,
        w:CAT_W, h:CAT_H,
        img:CAT_KEYS[(r+c)%4],
        hp:1, alive:true,
      });
    }
  }
}

const CHONKER_MSGS = ['OH LAWD HE COMIN!', "IT'S A HECKIN' CHONKER!"];
let chonkerMsg = null; // { text, timer }

function spawnChonker() {
  chonkerPhase=true;
  const img = level%2===0 ? 'chonker2':'chonker1';
  const maxHp = 15+level*8;
  chonker = { x:W/2-50, y:-110, w:100, h:100, img, hp:maxHp, maxHp, dx:2+level*0.4, alive:true };
  phase='chonker';
  chonkerMsg = { text: CHONKER_MSGS[Math.floor(Math.random()*CHONKER_MSGS.length)], timer: 180 };
}

function updatePowerupBar() {
  const el = document.getElementById('powerup-bar');
  if (!powerup) { el.textContent='\u00a0'; return; }
  const secs = Math.ceil(powerup.timer/60);
  const label = powerup.type==='twin' ? '✦ TWIN FIRE' : '✦ PIERCE';
  el.textContent = label+' — '+secs+'s';
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = '❤'.repeat(Math.max(0,lives));
}

// ── update ────────────────────────────────────────────────────────────────────
function update() {
  if (phase==='over' || phase==='title' || phase==='leaderboard') return;
  frame++;

  // Player
  const p = player;
  const spd = 5;
  if ((keys['ArrowLeft']||keys['a'])  && p.x>0)        p.x-=spd;
  if ((keys['ArrowRight']||keys['d']) && p.x<W-BOWL_W) p.x+=spd;

  // Shoot
  shotCooldown--;
  if ((keys[' ']||keys['ArrowUp']) && shotCooldown<=0) {
    shotCooldown=14;
    const ox = p.x+BOWL_W/2, oy = p.y;
    const dx = mouse.x - ox, dy = mouse.y - oy;
    const len = Math.sqrt(dx*dx+dy*dy) || 1;
    const spd = 11;
    const pierce = powerup && powerup.type==='pierce';
    const twin   = powerup && powerup.type==='twin';
    const makeShot = (offX) => ({ x:ox+offX-5, y:oy-12, w:10, h:10,
      vx:(dx/len)*spd, vy:(dy/len)*spd, pierce, hit:new Set() });
    shots.push(makeShot(0));
    if (twin) { shots.push(makeShot(-14)); shots.push(makeShot(14)); }
  }

  // Move shots
  shots = shots.filter(s=>{ s.x+=s.vx; s.y+=s.vy; return s.y>-20 && s.y<H+20 && s.x>-20 && s.x<W+20; });

  // ── cat phase ────────────────────────────────────────────────────────────────
  if (phase==='play') {
    const alive = cats.filter(c=>c.alive);

    // Step movement
    stepTimer++;
    if (stepTimer >= stepInterval) {
      stepTimer=0;
      let wall=false;
      for (const c of alive) {
        if ((stepDir>0 && c.x+CAT_W>=W-5)||(stepDir<0 && c.x<=5)) { wall=true; break; }
      }
      if (wall) {
        stepDir*=-1;
        for (const c of alive) c.y+=18;
      } else {
        for (const c of alive) c.x+=stepDir*18;
      }
      stepInterval = Math.max(8, 55 - (COLS*ROWS - alive.length)*1.5);
    }

    // Cat drops
    dropTimer++;
    if (dropTimer>35 && alive.length>0) {
      dropTimer=0;
      if (Math.random()<0.45) {
        const d=alive[Math.floor(Math.random()*alive.length)];
        drops.push({ x:d.x+CAT_W/2-4, y:d.y+CAT_H, w:8, h:8, speed:3.5+level*0.4 });
      }
    }

    // Shots vs cats
    for (const s of shots) {
      for (const c of cats) {
        if (!c.alive) continue;
        if (s.hit && s.hit.has(c)) continue;
        if (hit(s,c)) {
          if (!s.pierce) s.dead=true;
          if (s.hit) s.hit.add(c);
          c.hp--;
          if (Math.random()<0.35) {
            floaties.push({ x:c.x+c.w/2, y:c.y, dy:-0.8, alpha:1, life:70 });
          }
          if (c.hp<=0) {
            c.alive=false;
            score+=10+level*2; updateHUD();
            flyOffs.push({ x:c.x, y:c.y, w:c.w, h:c.h, img:c.img,
              dx:(Math.random()>0.5?1:-1)*(3+Math.random()*3), dy:-5-Math.random()*2,
              grav:0.18, alpha:1, life:55 });
            // 1-in-15 chance: drop a heart powerup
            if (Math.random()<1/15) {
              hearts.push({ x:c.x+CAT_W/2-10, y:c.y, w:20, h:20, speed:2 });
            }
            // 1-in-20: drop a weapon powerup
            if (!powerup && Math.random()<1/20) {
              const t = Math.random()<0.5?'twin':'pierce';
              hearts.push({ x:c.x+CAT_W/2-10, y:c.y, w:20, h:20, speed:2, pwup:t });
            }
          }
        }
      }
    }
    shots = shots.filter(s=>!s.dead);

    // Cats reach player
    for (const c of cats) {
      if (c.alive && c.y+CAT_H >= p.y) { lives=0; updateHUD(); phase='over'; gameOver=true; }
    }

    // All cats gone → chonker
    if (alive.filter(c=>c.alive).length===0 && !chonkerPhase) spawnChonker();
  }

  // ── chonker phase ─────────────────────────────────────────────────────────
  if (phase==='chonker' && chonker && chonker.alive) {
    const ch=chonker;
    ch.x+=ch.dx;
    if (ch.x<=0 || ch.x+ch.w>=W) ch.dx*=-1;
    if (ch.y<70) ch.y+=2.5;

    // Single drop every 20 frames
    if (frame%20===0) {
      drops.push({ x:ch.x+ch.w/2-4, y:ch.y+ch.h, w:8, h:8, speed:3+level*0.35 });
    }
    // Spread shot every 90 frames (was 45), wider spacing
    if (frame%90===0) {
      [-55,-25,0,25,55].forEach(off=>{
        drops.push({ x:ch.x+ch.w/2+off, y:ch.y+ch.h, w:8, h:8, speed:2.8+level*0.3 });
      });
    }

    // Shots vs chonker
    for (const s of shots) {
      if (hit(s,ch)) {
        s.dead=true; ch.hp--;
        if (ch.hp<=0) {
          ch.alive=false;
          score+=150+level*50; updateHUD();
          flyOffs.push({ x:ch.x, y:ch.y, w:ch.w, h:ch.h, img:ch.img,
            dx:(ch.dx>0?6:-6), dy:-8, grav:0.2, alpha:1, life:80 });
          chonkerPhase=false;
          setTimeout(()=>{ level++; spawnWave(); }, 1800);
        }
      }
    }
    shots = shots.filter(s=>!s.dead);
  }

  // ── drops ────────────────────────────────────────────────────────────────────
  drops = drops.filter(d=>{
    d.y+=d.speed;
    if (hit(d,p)) {
      lives--; updateHUD();
      if (lives<=0) { phase='over'; gameOver=true; }
      return false;
    }
    return d.y<H+20;
  });

  // ── fly-offs ─────────────────────────────────────────────────────────────────
  for (const f of flyOffs) {
    f.x+=f.dx; f.y+=f.dy; f.dy+=f.grav;
    f.alpha = Math.max(0, f.life/55);
    f.life--;
  }
  flyOffs = flyOffs.filter(f=>f.life>0);

  // hearts & powerup drops
  hearts = hearts.filter(h=>{
    h.y+=h.speed;
    if (hit(h,p)) {
      if (h.pwup) {
        powerup = { type:h.pwup, timer:600 };
        updatePowerupBar();
      } else {
        lives++; updateHUD();
      }
      return false;
    }
    return h.y<H+30;
  });

  // powerup timer
  if (powerup) {
    powerup.timer--;
    if (powerup.timer<=0) { powerup=null; updatePowerupBar(); }
    else if (powerup.timer % 60 === 0) updatePowerupBar();
  }

  // floaties
  for (const f of floaties) { f.y+=f.dy; f.alpha=f.life/70; f.life--; }
  floaties = floaties.filter(f=>f.life>0);

  // stars twinkle
  for (const s of stars) s.t+=0.03;
}

// ── draw ──────────────────────────────────────────────────────────────────────
function draw() {
  // BG
  ctx.fillStyle='#080810';
  ctx.fillRect(0,0,W,H);

  // Stars
  for (const s of stars) {
    const b = 0.35+0.65*Math.abs(Math.sin(s.t));
    ctx.globalAlpha=b*0.7;
    ctx.fillStyle='#aabbff';
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  // Scanlines
  ctx.fillStyle='rgba(0,0,0,0.07)';
  for (let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1.5);

  if (!player || phase==='title') {
    drawTitle(); return;
  }

  // Ground
  const gGrad = ctx.createLinearGradient(0,H-18,0,H);
  gGrad.addColorStop(0,'#1a1a3a'); gGrad.addColorStop(1,'#080810');
  ctx.fillStyle=gGrad;
  ctx.fillRect(0,H-18,W,18);
  ctx.strokeStyle='#2233aa';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H-18); ctx.lineTo(W,H-18); ctx.stroke();

  // Cats
  for (const c of cats) {
    if (!c.alive) continue;
    drawSprite(c.img,c.x,c.y,c.w,c.h);
  }

  // Chonker
  if (chonker && chonker.alive) {
    const ch=chonker;
    drawSprite(ch.img,ch.x,ch.y,ch.w,ch.h);
    // glow
    ctx.shadowColor='#ff4466'; ctx.shadowBlur=18;
    ctx.strokeStyle='#ff4466';
    ctx.lineWidth=2;
    ctx.strokeRect(ch.x,ch.y,ch.w,ch.h);
    ctx.shadowBlur=0;
    // HP bar bg
    ctx.fillStyle='#220011';
    ctx.fillRect(ch.x,ch.y-16,ch.w,10);
    // HP bar fill
    const hpFrac = ch.hp/ch.maxHp;
    const hpCol = hpFrac>0.5?'#44ff88':hpFrac>0.25?'#ffcc00':'#ff4444';
    ctx.fillStyle=hpCol;
    ctx.fillRect(ch.x,ch.y-16,ch.w*hpFrac,10);
    ctx.strokeStyle='#ff88aa'; ctx.lineWidth=1;
    ctx.strokeRect(ch.x,ch.y-16,ch.w,10);
    // Label
    ctx.fillStyle='#ff88aa';
    ctx.font='7px "Press Start 2P"';
    ctx.textAlign='center';
    ctx.fillText('CHONKER',ch.x+ch.w/2,ch.y-20);
  }

  // Player shots (kibble)
  for (const s of shots) {
    drawSprite('kibble',s.x,s.y,s.w,s.h);
    if (s.pierce) {
      ctx.strokeStyle='#ff44cc';
      ctx.lineWidth=2;
      ctx.shadowColor='#ff44cc'; ctx.shadowBlur=8;
      ctx.strokeRect(s.x,s.y,s.w,s.h);
      ctx.shadowBlur=0;
    }
  }

  // Falling hearts / powerups
  for (const h of hearts) {
    ctx.font='18px sans-serif';
    ctx.textAlign='center';
    ctx.globalAlpha=0.9;
    if (h.pwup) {
      ctx.fillStyle='#ff44cc';
      ctx.shadowColor='#ff44cc'; ctx.shadowBlur=10;
      ctx.fillText(h.pwup==='twin'?'⚡':'★', h.x+10, h.y+18);
      ctx.shadowBlur=0;
    } else {
      ctx.fillText('❤', h.x+10, h.y+18);
    }
    ctx.globalAlpha=1;
  }

  // Drops (poops)
  for (const d of drops) {
    const px = d.x+4, py = d.y+4;
    ctx.fillStyle='#5c3317';
    ctx.beginPath();
    ctx.ellipse(px,py+3,5,3.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(px+0.5,py,4,3.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(px,py-3.5,2.8,2.8,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(px+0.5,py-6,1.5,1.8,0.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,200,150,0.22)';
    ctx.beginPath();
    ctx.ellipse(px-1.5,py-4,1,0.8,-.4,0,Math.PI*2); ctx.fill();
  }

  // Fly-offs
  for (const f of flyOffs) {
    drawSprite(f.img,f.x,f.y,f.w,f.h,f.alpha);
    // ✨ hearts
    if (Math.random()<0.15) {
      ctx.fillStyle='rgba(255,150,200,'+f.alpha+')';
      ctx.font='14px sans-serif';
      ctx.textAlign='center';
      ctx.fillText('❤',f.x+f.w/2+(Math.random()-0.5)*20, f.y-Math.random()*10);
    }
  }

  // nomnomnom floaties
  ctx.font = '9px "Press Start 2P"';
  ctx.textAlign = 'center';
  for (const f of floaties) {
    ctx.globalAlpha = f.alpha * 0.75;
    ctx.fillStyle = '#ffeeaa';
    ctx.fillText('nomnomnom', f.x, f.y);
  }
  ctx.globalAlpha = 1;

  // Player bowl
  ctx.drawImage(bowlCanvas, player.x, player.y, BOWL_W, BOWL_H);

  // Level badge
  ctx.fillStyle='#334488';
  ctx.fillRect(0,H-16,W,16);
  ctx.fillStyle='#4466cc';
  ctx.font='8px "Press Start 2P"';
  ctx.textAlign='left';
  ctx.fillText('LEVEL '+level, 8, H-4);

  // Chonker announcement
  if (chonkerMsg && chonkerMsg.timer > 0) {
    chonkerMsg.timer--;
    const t = chonkerMsg.timer;
    const alpha = t > 150 ? 1 : t / 150;
    const scale = t > 150 ? 1 + (180-t)*0.008 : 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(W/2, H/2);
    ctx.scale(scale, scale);
    ctx.textAlign = 'center';
    // Shadow
    ctx.font = '20px "Press Start 2P"';
    ctx.fillStyle = '#000';
    ctx.fillText(chonkerMsg.text, 3, 3);
    // Colour cycle
    const hue = (frame*4) % 360;
    ctx.fillStyle = `hsl(${hue},100%,65%)`;
    ctx.shadowColor = `hsl(${hue},100%,50%)`;
    ctx.shadowBlur = 20;
    ctx.fillText(chonkerMsg.text, 0, 0);
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // Screens
  if (phase==='over') drawGameOver();
  if (phase==='leaderboard') {
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,W,H);
  }
}

function drawTitle() {
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ff88ff';
  ctx.font='22px "Press Start 2P"';
  ctx.shadowColor='#ff44ff'; ctx.shadowBlur=20;
  ctx.fillText('CHONK INVADERS',W/2,H/2-30);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffcc00';
  ctx.font='10px "Press Start 2P"';
  ctx.fillText('TAP  /  ENTER',W/2,H/2+20);
  ctx.fillStyle='#888';
  ctx.font='8px "Press Start 2P"';
  ctx.fillText('PRESS L FOR HIGH SCORES',W/2,H/2+50);
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='26px "Press Start 2P"';
  ctx.fillStyle='#ff3333';
  ctx.shadowColor='#ff0000'; ctx.shadowBlur=25;
  ctx.fillText('GAME OVER',W/2,H/2-40);
  ctx.shadowBlur=0;
  ctx.font='11px "Press Start 2P"';
  ctx.fillStyle='#ffcc00';
  ctx.fillText('SCORE: '+score,W/2,H/2+5);
  ctx.fillStyle='#888';
  ctx.font='8px "Press Start 2P"';
  ctx.fillText('ENTER TO SUBMIT  /  L FOR SCORES',W/2,H/2+38);
}

// ── loop ──────────────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  phase='title';
  makeStars();
  frame=0;
  fetchLeaderboard();
  loop();
}
</script>
