<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard &mdash; J. Miles Caldwell</title>
  <link rel="icon" href="/resources/compass_favicon_32x32.png" type="image/png">
  <link
    href="https://fonts.googleapis.com/css2?family=Almendra&family=Cinzel:wght@400;700&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: rgba(0,0,0,0.7);
      --ink: #FAF4E0;
      --accent: #C9B37E;
      --rule: rgba(250,244,224,0.15);
      --muted: rgba(250,244,224,0.55);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Almendra', serif;
      font-size: 16px;
      line-height: 1.5;
    }
    header {
      padding: 1.25rem 1.5rem 0.75rem;
      text-align: center;
      border-bottom: 1px solid var(--rule);
    }
    header h1 {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      margin: 0 0 0.25rem;
      font-size: 1.6rem;
      letter-spacing: 0.05em;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.25rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      min-height: 360px;
      display: flex;
      flex-direction: column;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--rule);
    }
    .panel-head h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      margin: 0;
      color: var(--accent);
    }
    .panel-head .meta {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .panel-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--rule);
    }
    .tab {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab:hover { color: var(--ink); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-panel { display: none; flex: 1; overflow-y: auto; }
    .tab-panel.active { display: block; }

    /* ---- Weather ---- */
    .wx-row {
      display: grid;
      grid-template-columns: 70px 32px 1fr auto;
      gap: 0.75rem;
      align-items: center;
      padding: 0.4rem 0;
      border-bottom: 1px dashed var(--rule);
      font-size: 0.95rem;
    }
    .wx-row:last-child { border-bottom: none; }
    .wx-time { color: var(--muted); font-size: 0.85rem; }
    .wx-icon { font-size: 1.3rem; text-align: center; }
    .wx-desc { color: var(--ink); }
    .wx-temp { font-weight: 700; color: var(--accent); white-space: nowrap; }
    .wx-precip { font-size: 0.8rem; color: var(--muted); margin-left: 0.4rem; }

    /* ---- News ---- */
    .news-item {
      padding: 0.6rem 0;
      border-bottom: 1px dashed var(--rule);
    }
    .news-item:last-child { border-bottom: none; }
    .news-item a {
      color: var(--ink);
      text-decoration: none;
      font-size: 0.95rem;
      line-height: 1.35;
      display: block;
    }
    .news-item a:hover { color: var(--accent); }
    .news-meta {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      margin-top: 0.25rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .news-source { font-family: 'Cinzel', serif; letter-spacing: 0.04em; }

    .loading, .error {
      color: var(--muted);
      font-style: italic;
      padding: 1rem 0;
      font-size: 0.9rem;
    }
    .error { color: #c98a8a; }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Dashboard</h1>
    <p>A single pane of glass.</p>
  </header>

  <main>
    <!-- NEWS (top left) -->
    <section class="panel" id="news-panel">
      <div class="panel-head">
        <h2>Headlines</h2>
        <span class="meta" id="news-meta">loading&hellip;</span>
      </div>
      <div class="panel-body">
        <div id="news-list" class="loading">Fetching feeds&hellip;</div>
      </div>
    </section>

    <!-- WEATHER (top right) -->
    <section class="panel" id="weather-panel">
      <div class="panel-head">
        <h2>Weather</h2>
        <span class="meta" id="wx-location">locating&hellip;</span>
      </div>
      <div class="panel-body">
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="wx-12h">12 h</button>
          <button class="tab" data-tab="wx-24h">24 h</button>
          <button class="tab" data-tab="wx-7d">7 d</button>
        </div>
        <div id="wx-12h" class="tab-panel active"><div class="loading">Fetching forecast&hellip;</div></div>
        <div id="wx-24h" class="tab-panel"><div class="loading">Fetching forecast&hellip;</div></div>
        <div id="wx-7d" class="tab-panel"><div class="loading">Fetching forecast&hellip;</div></div>
      </div>
    </section>
  </main>

  <footer>
    <a href="index.html">&larr; back to landing</a>
    &nbsp;&middot;&nbsp;
    weather via <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a>,
    headlines via <a href="https://rss2json.com/" target="_blank" rel="noopener">rss2json</a>
  </footer>

  <script>
  /* =========================================================================
     Tabs
     ========================================================================= */
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.tab;
      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.tab-panel').forEach(p => {
        p.classList.toggle('active', p.id === target);
      });
    });
  });

  /* =========================================================================
     Weather (Open-Meteo, no key, CORS-enabled)
     ========================================================================= */
  const WX_FALLBACK = { lat: 52.5168, lon: 6.0830, label: 'Zwolle, NL (default)' };

  // WMO weather code -> {icon, text}
  // https://open-meteo.com/en/docs (WMO Weather interpretation codes)
  const WX_CODES = {
    0:  ['☀️', 'Clear'],
    1:  ['\u{1F324}️', 'Mostly clear'],
    2:  ['⛅', 'Partly cloudy'],
    3:  ['☁️', 'Overcast'],
    45: ['\u{1F32B}️', 'Fog'],
    48: ['\u{1F32B}️', 'Rime fog'],
    51: ['\u{1F327}️', 'Light drizzle'],
    53: ['\u{1F327}️', 'Drizzle'],
    55: ['\u{1F327}️', 'Dense drizzle'],
    56: ['\u{1F327}️', 'Freezing drizzle'],
    57: ['\u{1F327}️', 'Freezing drizzle'],
    61: ['\u{1F327}️', 'Light rain'],
    63: ['\u{1F327}️', 'Rain'],
    65: ['\u{1F327}️', 'Heavy rain'],
    66: ['\u{1F327}️', 'Freezing rain'],
    67: ['\u{1F327}️', 'Freezing rain'],
    71: ['\u{1F328}️', 'Light snow'],
    73: ['\u{1F328}️', 'Snow'],
    75: ['\u{1F328}️', 'Heavy snow'],
    77: ['\u{1F328}️', 'Snow grains'],
    80: ['\u{1F326}️', 'Light showers'],
    81: ['\u{1F326}️', 'Showers'],
    82: ['\u{1F326}️', 'Violent showers'],
    85: ['\u{1F328}️', 'Snow showers'],
    86: ['\u{1F328}️', 'Heavy snow showers'],
    95: ['⛈️', 'Thunderstorm'],
    96: ['⛈️', 'Thunderstorm w/ hail'],
    99: ['⛈️', 'Severe thunderstorm']
  };

  function wxDesc(code) {
    return WX_CODES[code] || ['❓', 'Unknown'];
  }

  function getLocation() {
    return new Promise(resolve => {
      if (!navigator.geolocation) return resolve(WX_FALLBACK);
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, label: null }),
        () => resolve(WX_FALLBACK),
        { timeout: 8000, maximumAge: 600000 }
      );
    });
  }

  async function reverseGeocode(lat, lon) {
    // Open-Meteo's reverse geocode endpoint is search-only; use BigDataCloud free reverse geocode.
    try {
      const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
      if (!r.ok) return null;
      const j = await r.json();
      const city = j.city || j.locality || j.principalSubdivision || '';
      const region = j.principalSubdivisionCode ? j.principalSubdivisionCode.replace(/^[A-Z]{2}-/, '') : '';
      return [city, region].filter(Boolean).join(', ');
    } catch { return null; }
  }

  function fmtHour(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: 'numeric', hour12: true });
  }
  function fmtDay(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString([], { weekday: 'short' });
  }

  function renderHourly(container, times, temps, precips, codes, hours) {
    const now = Date.now();
    let startIdx = times.findIndex(t => new Date(t).getTime() >= now);
    if (startIdx < 0) startIdx = 0;
    const end = Math.min(startIdx + hours, times.length);
    let html = '';
    for (let i = startIdx; i < end; i++) {
      const [icon, desc] = wxDesc(codes[i]);
      html += `<div class="wx-row">
        <span class="wx-time">${fmtHour(times[i])}</span>
        <span class="wx-icon">${icon}</span>
        <span class="wx-desc">${desc}<span class="wx-precip">${precips[i] != null ? precips[i] + '%' : ''}</span></span>
        <span class="wx-temp">${Math.round(temps[i])}&deg;F</span>
      </div>`;
    }
    container.innerHTML = html || '<div class="error">No hourly data.</div>';
  }

  function renderDaily(container, times, hi, lo, precips, codes) {
    let html = '';
    for (let i = 0; i < times.length; i++) {
      const [icon, desc] = wxDesc(codes[i]);
      html += `<div class="wx-row">
        <span class="wx-time">${fmtDay(times[i])}</span>
        <span class="wx-icon">${icon}</span>
        <span class="wx-desc">${desc}<span class="wx-precip">${precips[i] != null ? precips[i] + '%' : ''}</span></span>
        <span class="wx-temp">${Math.round(hi[i])}&deg; / ${Math.round(lo[i])}&deg;</span>
      </div>`;
    }
    container.innerHTML = html || '<div class="error">No daily data.</div>';
  }

  async function loadWeather() {
    const locEl = document.getElementById('wx-location');
    const loc = await getLocation();
    locEl.textContent = loc.label || `${loc.lat.toFixed(2)}, ${loc.lon.toFixed(2)}`;

    if (!loc.label) {
      reverseGeocode(loc.lat, loc.lon).then(name => {
        if (name) locEl.textContent = name;
      });
    }

    const url = `https://api.open-meteo.com/v1/forecast`
      + `?latitude=${loc.lat}&longitude=${loc.lon}`
      + `&hourly=temperature_2m,precipitation_probability,weather_code`
      + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code`
      + `&temperature_unit=fahrenheit&timezone=auto&forecast_days=7`;

    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();

      const h = data.hourly;
      renderHourly(document.getElementById('wx-12h'),
        h.time, h.temperature_2m, h.precipitation_probability, h.weather_code, 12);
      renderHourly(document.getElementById('wx-24h'),
        h.time, h.temperature_2m, h.precipitation_probability, h.weather_code, 24);

      const d = data.daily;
      renderDaily(document.getElementById('wx-7d'),
        d.time, d.temperature_2m_max, d.temperature_2m_min,
        d.precipitation_probability_max, d.weather_code);
    } catch (err) {
      const msg = `<div class="error">Couldn't load forecast: ${err.message}</div>`;
      ['wx-12h','wx-24h','wx-7d'].forEach(id => document.getElementById(id).innerHTML = msg);
    }
  }

  /* =========================================================================
     News (RSS via rss2json proxy)
     ========================================================================= */
  const NEWS_FEEDS = [
    { source: 'BBC',      url: 'https://feeds.bbci.co.uk/news/world/rss.xml' },
    { source: 'NPR',      url: 'https://feeds.npr.org/1004/rss.xml' },
    { source: 'Guardian', url: 'https://www.theguardian.com/world/rss' },
    { source: 'Al Jazeera', url: 'https://www.aljazeera.com/xml/rss/all.xml' }
  ];
  const PER_FEED = 8;
  const MAX_HEADLINES = 24;

  function fmtRelative(date) {
    const diff = (Date.now() - date.getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  async function fetchFeed(feed) {
    const url = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feed.url);
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error(r.status);
      const j = await r.json();
      if (j.status !== 'ok') throw new Error(j.message || 'feed error');
      return (j.items || []).slice(0, PER_FEED).map(it => ({
        source: feed.source,
        title: it.title,
        link: it.link,
        date: new Date(it.pubDate || Date.now())
      }));
    } catch (err) {
      console.warn('Feed failed:', feed.source, err);
      return [];
    }
  }

  async function loadNews() {
    const list = document.getElementById('news-list');
    const meta = document.getElementById('news-meta');
    const results = await Promise.all(NEWS_FEEDS.map(fetchFeed));
    const items = results.flat()
      .filter(i => i.title && i.link)
      .sort((a, b) => b.date - a.date)
      .slice(0, MAX_HEADLINES);

    if (!items.length) {
      list.className = 'error';
      list.textContent = "Couldn't load any feeds.";
      meta.textContent = '';
      return;
    }

    list.className = '';
    list.innerHTML = items.map(i => `
      <div class="news-item">
        <a href="${i.link}" target="_blank" rel="noopener">${i.title}</a>
        <div class="news-meta">
          <span class="news-source">${i.source}</span>
          <span>${fmtRelative(i.date)}</span>
        </div>
      </div>
    `).join('');
    meta.textContent = `${items.length} headlines`;
  }

  /* =========================================================================
     Init
     ========================================================================= */
  loadWeather();
  loadNews();
  </script>
</body>
</html>
