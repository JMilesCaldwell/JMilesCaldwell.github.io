<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard &mdash; J. Miles Caldwell</title>
  <link rel="icon" href="/resources/compass_favicon_32x32.png" type="image/png">
  <link
    href="https://fonts.googleapis.com/css2?family=Almendra&family=Cinzel:wght@400;700&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: rgba(0,0,0,0.7);
      --ink: #FAF4E0;
      --accent: #C9B37E;
      --rule: rgba(250,244,224,0.15);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Almendra', serif;
      font-size: 16px;
      line-height: 1.5;
    }
    header {
      padding: 1.5rem 1.5rem 0.75rem;
      text-align: center;
      border-bottom: 1px solid var(--rule);
    }
    header h1 {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      margin: 0 0 0.25rem;
      font-size: 1.75rem;
      letter-spacing: 0.05em;
    }
    header p {
      margin: 0;
      opacity: 0.75;
      font-size: 0.95rem;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      min-height: 140px;
    }
    .panel h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      margin: 0 0 0.5rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--rule);
      color: var(--accent);
    }
    .panel .placeholder {
      opacity: 0.55;
      font-style: italic;
      font-size: 0.95rem;
    }
    a { color: var(--ink); }
    a:hover { color: var(--accent); }
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dashboard</h1>
    <p>A single pane of glass &mdash; under construction.</p>
  </header>

  <main>
    <section class="panel" id="panel-1">
      <h2>Panel One</h2>
      <p class="placeholder">Reserved.</p>
    </section>
    <section class="panel" id="panel-2">
      <h2>Panel Two</h2>
      <p class="placeholder">Reserved.</p>
    </section>
    <section class="panel" id="panel-3">
      <h2>Panel Three</h2>
      <p class="placeholder">Reserved.</p>
    </section>
    <section class="panel" id="panel-4">
      <h2>Panel Four</h2>
      <p class="placeholder">Reserved.</p>
    </section>
  </main>

  <footer>
    <a href="index.html">&larr; back to landing</a>
  </footer>
</body>
</html>
